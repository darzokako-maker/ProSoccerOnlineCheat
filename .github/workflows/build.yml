name: Build Ohiohook External

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Bilgisayara Cek (Checkout)
      uses: actions/checkout@v4

    - name: MSVC Yukle ve Hileyi Derle
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cl.exe /EHsc /O2 /DUNICODE /D_UNICODE /Fe:Ohiohook_External.exe main.cpp user32.lib /link /machine:x64

    - name: EXE Dosyasini Sisteme Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Ohiohook_Sifir_Hata_Sürümü
        path: Ohiohook_External.exe
        
